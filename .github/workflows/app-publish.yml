
.github/workflows/app-publish.yml

```yaml
name: Publish GitHub App

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update App Manifest
        env:
          APP_ID: ${{ secrets.GH_APP_ID }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          jq '.hook_attributes.url = "https://${{ secrets.APP_DOMAIN }}/webhooks/github"' .github/APP_MANIFEST.json > manifest.json
          jq '.hook_attributes.secret = "$WEBHOOK_SECRET"' manifest.json > final-manifest.json
      - name: Publish to GitHub Marketplace
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('final-manifest.json', 'utf8'));
            await github.rest.apps.updateWebhookConfigForApp({
              app_id: process.env.APP_ID,
              ...manifest.hook_attributes
            });
```
